<!DOCTYPE html>

  <title>Autograph Karaoke Menu</title>
  <style>
    body {font-family: Arial, sans-serif; margin:0; background:#0f0f0f; color:#f5f5f5;}
    header {padding:20px; text-align:center; border-bottom:1px solid #333;}
    h1 {margin:0; letter-spacing:2px;}
    .lang {margin-top:10px;}
    .lang button {margin:0 5px; padding:5px 10px; cursor:pointer;}
    .container {padding:20px; max-width:900px; margin:auto;}
    .category {margin-top:30px;}
    .item {display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px dashed #333;}
    .item button {padding:3px 8px;}
    .cart {position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; padding:15px; border-top:2px solid #444;}
    .total {font-size:18px; font-weight:bold;}
  </style>
</head>
<body>

  <div class="lang">
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('kz')">KZ</button>
  </div>
</header>

<div class="container" id="menu"></div>

<div class="cart">

let lang = 'ru';
let total = 0;

function render() {
  const m = document.getElementById('menu');
  m.innerHTML = '';
  data[lang].categories.forEach(cat => {
    const c = document.createElement('div');
    c.className = 'category';
    c.innerHTML = `<h2>${cat.name}</h2>`;
    cat.items.forEach(i => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `<span>${i[0]} — ${i[1]} ₸</span><button onclick="add(${i[1]})">+</button>`;
      c.appendChild(div);
    });
    m.appendChild(c);
  });
}

function add(price){ total += price; document.getElementById('total').innerText = `${lang==='ru'?'Итого':'Барлығы'}: ${total} ₸`; }
function setLang(l){ lang=l; total=0; render(); document.getElementById('total').innerText = `${lang==='ru'?'Итого':'Барлығы'}: 0 ₸`; }
render(); total=0; add(0); }
render();
</script>
</body>
</html>
