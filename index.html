<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUTOGRAPH — QR Menu</title>
  <style>
    :root{
      --bg:#0b0b0b;
      --panel:#111;
      --gold:#bfa46a;
      --text:#f5f5f5;
      --muted:#bdbdbd;
      --line:#2a2a2a;
      --btn:#000;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:18px 14px;text-align:center;border-bottom:2px solid var(--gold)}
    h1{margin:0;letter-spacing:4px;color:var(--gold);font-size:22px}
    .topbar{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:10px;flex-wrap:wrap}
    .chip{border:1px solid var(--gold);color:var(--gold);background:var(--btn);padding:6px 10px;border-radius:10px;cursor:pointer}
    .chip.active{background:var(--gold);color:#0b0b0b;font-weight:700}
    .wrap{max-width:980px;margin:0 auto;padding:16px 14px 140px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin:10px 0 16px}
    .search{
      flex:1;min-width:220px;max-width:520px;
      background:#0f0f0f;border:1px solid var(--line);
      color:var(--text);padding:10px 12px;border-radius:12px;
      outline:none;
    }
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{border:1px solid var(--gold);background:transparent;color:var(--gold);padding:8px 10px;border-radius:12px;cursor:pointer}
    .tab.active{background:var(--gold);color:#0b0b0b;font-weight:700}
    .category{margin:22px 0}
    .category h2{margin:0 0 10px;color:var(--gold);font-size:18px;border-bottom:1px solid var(--gold);padding-bottom:6px}
    .item{
      display:flex;gap:10px;justify-content:space-between;align-items:center;
      padding:10px 0;border-bottom:1px dashed var(--line)
    }
    .iname{font-size:14px;line-height:1.25}
    .iprice{color:var(--muted);font-size:13px;margin-left:8px;white-space:nowrap}
    .controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .btn{
      width:34px;height:34px;border-radius:10px;
      border:1px solid var(--gold);background:transparent;color:var(--gold);
      font-size:18px;cursor:pointer
    }
    .qty{min-width:18px;text-align:center;font-weight:700;color:var(--text)}
    .cart{
      position:fixed;left:0;right:0;bottom:0;
      background:linear-gradient(180deg, rgba(17,17,17,0.92), rgba(17,17,17,0.98));
      border-top:2px solid var(--gold);
      padding:12px 14px;
      backdrop-filter: blur(6px);
    }
    .cart-inner{max-width:980px;margin:0 auto;display:flex;gap:12px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
    .cart-left{min-width:240px;flex:1}
    .cart-title{color:var(--muted);font-size:12px;margin-bottom:6px}
    .cart-items{font-size:13px;line-height:1.35;max-height:80px;overflow:auto;padding-right:6px}
    .cart-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .total{font-size:16px;font-weight:800;color:var(--gold)}
    .small{font-size:12px;color:var(--muted)}
    .action{
      border:none;border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:700
    }
    .clear{background:#3a0b0b;color:#fff}
    .waiter{background:var(--gold);color:#0b0b0b}
    .svc-toggle{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px}
    .svc-toggle input{transform:scale(1.1)}
    /* modal */
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,.65);
      display:none;align-items:center;justify-content:center;padding:14px;
    }
    .modal{max-width:560px;width:100%;background:#0f0f0f;border:1px solid var(--gold);
      border-radius:16px;padding:14px}
    .modal h3{margin:0 0 10px;color:var(--gold);letter-spacing:1px}
    .modal pre{white-space:pre-wrap;word-break:break-word;background:#0b0b0b;border:1px solid var(--line);
      border-radius:12px;padding:10px;color:var(--text);font-size:13px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;flex-wrap:wrap}
    .modal-actions .action{padding:10px 14px}
    .copy{background:#1a1a1a;color:var(--gold);border:1px solid var(--gold)}
    .close{background:#222;color:#fff;border:1px solid #444}
  </style>
</head>
<body>
  <header>
    <h1>AUTOGRAPH</h1>
    <div class="topbar">
      <button class="chip active" id="ruBtn" onclick="setLang('ru')">RU</button>
      <button class="chip" id="kzBtn" onclick="setLang('kz')">KZ</button>
    </div>
  </header>

  <div class="wrap">
    <div class="toolbar">
      <input id="q" class="search" placeholder="Поиск по меню..." oninput="render()" />
      <div class="tabs">
        <button class="tab active" id="tabAll" onclick="setSection('all')">Всё</button>
        <button class="tab" id="tabFood" onclick="setSection('food')">Кухня</button>
        <button class="tab" id="tabBar" onclick="setSection('bar')">Бар</button>
      </div>
    </div>

    <div id="menu"></div>
  </div>

  <div class="cart">
    <div class="cart-inner">
      <div class="cart-left">
        <div class="cart-title" id="cartTitle">Выбрано:</div>
        <div class="cart-items" id="cartItems">Корзина пуста</div>
      </div>

      <div class="cart-right">
        <label class="svc-toggle">
          <input type="checkbox" id="svc" checked onchange="updateCart()" />
          <span id="svcLabel">Сервис 10%</span>
        </label>
        <div>
          <div class="total" id="total">Итого: 0 ₸</div>
          <div class="small" id="breakdown"></div>
        </div>
        <button class="action clear" onclick="clearCart()" id="clearBtn">Очистить</button>
        <button class="action waiter" onclick="showWaiter()" id="waiterBtn">Показать официанту</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="mb" onclick="if(event.target.id==='mb')hideModal()">
    <div class="modal">
      <h3 id="modalTitle">Заказ</h3>
      <pre id="orderText"></pre>
      <div class="modal-actions">
        <button class="action copy" onclick="copyOrder()">Скопировать</button>
        <button class="action close" onclick="hideModal()">Закрыть</button>
      </div>
    </div>
  </div>

/* ЛОГИКА */
let lang = 'ru';
let section = 'all'; // all | food | bar
let cart = {}; // key: name | {price, qty}

function setLang(l){
  lang = l;
  document.getElementById('ruBtn').classList.toggle('active', l==='ru');
  document.getElementById('kzBtn').classList.toggle('active', l==='kz');
  // пока kz = ru (чтобы точно работало). Скажешь — сделаю 100% перевод.
  render();
  updateCart();
}

function setSection(s){
  section = s;
  document.getElementById('tabAll').classList.toggle('active', s==='all');
  document.getElementById('tabFood').classList.toggle('active', s==='food');
  document.getElementById('tabBar').classList.toggle('active', s==='bar');
  render();
}

function add(name, price){
  if(!cart[name]) cart[name] = {price, qty:0};
  cart[name].qty++;
  updateCart();
}

function sub(name){
  if(!cart[name]) return;
  cart[name].qty--;
  if(cart[name].qty<=0) delete cart[name];
  updateCart();
}

function clearCart(){
  cart = {};
  updateCart();
}

function fmt(n){
  return (n||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');
}

function currentData(){
  // если kz не заполнен — используем ru, чтобы не было пустоты
  return (lang==='kz' && DATA.kz) ? DATA.kz : DATA.ru;
}

function render(){
  const q = (document.getElementById('q').value || '').trim().toLowerCase();
  const root = document.getElementById('menu');
  root.innerHTML = '';

  const d = currentData();
  const blocks = [];
  if(section==='all' || section==='food') blocks.push(...d.food.map(c=>({group:'food',...c})));
  if(section==='all' || section==='bar')  blocks.push(...d.bar.map(c=>({group:'bar',...c})));

  blocks.forEach(cat=>{
    // фильтр по поиску
    const items = cat.items.filter(([n]) => !q || n.toLowerCase().includes(q));
    if(items.length===0) return;

    const wrap = document.createElement('div');
    wrap.className = 'category';
    wrap.innerHTML = `<h2>${cat.name}</h2>`;

    items.forEach(([name, price])=>{
      const row = document.createElement('div');
      row.className = 'item';
      const qty = cart[name]?.qty || 0;

      row.innerHTML = `
        <div class="iname">
          ${name}
          <span class="iprice">${fmt(price)} ₸</span>
        </div>
        <div class="controls">
          <button class="btn" onclick="sub(${JSON.stringify(name)})">−</button>
          <div class="qty">${qty}</div>
          <button class="btn" onclick="add(${JSON.stringify(name)}, ${price})">+</button>
        </div>
      `;
      wrap.appendChild(row);
    });

    root.appendChild(wrap);
  });

  // подписи
  document.getElementById('cartTitle').textContent = (lang==='ru') ? 'Выбрано:' : 'Таңдалғаны:';
  document.getElementById('svcLabel').textContent = (lang==='ru') ? 'Сервис 10%' : 'Қызмет 10%';
  document.getElementById('clearBtn').textContent = (lang==='ru') ? 'Очистить' : 'Тазалау';
  document.getElementById('waiterBtn').textContent = (lang==='ru') ? 'Показать официанту' : 'Официантқа көрсету';
}

function updateCart(){
  const listEl = document.getElementById('cartItems');

  const entries = Object.entries(cart);
  if(entries.length===0){
    listEl.innerHTML = (lang==='ru') ? 'Корзина пуста' : 'Себет бос';
    document.getElementById('total').textContent = (lang==='ru') ? 'Итого: 0 ₸' : 'Барлығы: 0 ₸';
    document.getElementById('breakdown').textContent = '';
    // обновим счетчики в меню
    render();
    return;
  }

  let sum = 0;
  let html = '';
  entries.forEach(([name, it])=>{
    const line = it.price * it.qty;
    sum += line;
    html += `${name} ×${it.qty} — ${fmt(line)} ₸<br>`;
  });

  const svcOn = document.getElementById('svc').checked;
  const svc = svcOn ? Math.round(sum * 0.10) : 0;
  const total = sum + svc;

  listEl.innerHTML = html;
  document.getElementById('total').textContent =
    (lang==='ru') ? `Итого: ${fmt(total)} ₸` : `Барлығы: ${fmt(total)} ₸`;

  document.getElementById('breakdown').textContent =
    svcOn ? ((lang==='ru') ? `Сумма: ${fmt(sum)} ₸ + сервис 10%: ${fmt(svc)} ₸` : `Сома: ${fmt(sum)} ₸ + қызмет 10%: ${fmt(svc)} ₸`)
          : ((lang==='ru') ? `Сумма: ${fmt(sum)} ₸ (сервис выключен)` : `Сома: ${fmt(sum)} ₸ (қызмет өшірулі)`);

  // перерисуем меню, чтобы qty обновились
  render();
}

function showWaiter(){
  const entries = Object.entries(cart);
  if(entries.length===0){ return; }

  const svcOn = document.getElementById('svc').checked;
  let sum = 0;
  let text = 'AUTOGRAPH — заказ\\n\\n';

  entries.forEach(([name, it])=>{
    const line = it.price * it.qty;
    sum += line;
    text += `• ${name} ×${it.qty} — ${fmt(line)} ₸\\n`;
  });

  const svc = svcOn ? Math.round(sum * 0.10) : 0;
  const total = sum + svc;

  text += `\\nСумма: ${fmt(sum)} ₸\\n`;
  text += svcOn ? `Сервис 10%: ${fmt(svc)} ₸\\n` : `Сервис: выключен\\n`;
  text += `ИТОГО: ${fmt(total)} ₸\\n`;
  text += `\\nОбслуживание: 10%`;

  document.getElementById('orderText').textContent = text;
  document.getElementById('mb').style.display = 'flex';
}

function hideModal(){
  document.getElementById('mb').style.display = 'none';
}

async function copyOrder(){
  const t = document.getElementById('orderText').textContent;
  try{
    await navigator.clipboard.writeText(t);
    alert('Скопировано ✅');
  }catch(e){
    alert('Не получилось скопировать. Выдели текст и скопируй вручную.');
  }
}

// старт
render();
updateCart();
</script>
