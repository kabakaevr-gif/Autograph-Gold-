<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Autograph Gold — QR Menu</title>
  <style>
    :root{--bg:#0b0b0b;--gold:#c9b27c;--text:#f5f5f5;--muted:#bdbdbd;--line:#2a2a2a}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:16px 14px;text-align:center;border-bottom:2px solid var(--gold)}
    h1{margin:0;letter-spacing:3px;color:var(--gold);font-size:22px}
    .top{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:10px}
    .chip{border:1px solid var(--gold);background:#000;color:var(--gold);padding:6px 10px;border-radius:10px;cursor:pointer;font-weight:700}
    .chip.active{background:var(--gold);color:#000}
    .wrap{max-width:980px;margin:0 auto;padding:16px 14px 170px}
    .toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin:8px 0 14px}
    .search{flex:1;min-width:220px;max-width:520px;background:#0f0f0f;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;outline:none}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{border:1px solid var(--gold);background:transparent;color:var(--gold);padding:8px 10px;border-radius:12px;cursor:pointer;font-weight:700}
    .tab.active{background:var(--gold);color:#000}
    .category{margin:22px 0}
    .category h2{margin:0 0 10px;color:var(--gold);border-bottom:1px solid var(--gold);padding-bottom:6px;font-size:18px}
    .item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line)}
    .iname{font-size:14px;line-height:1.25}
    .iprice{color:var(--muted);font-size:13px;margin-left:8px;white-space:nowrap}
    .controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--gold);background:#000;color:var(--gold);font-size:18px;cursor:pointer}
    .qty{min-width:18px;text-align:center;font-weight:900}

    .cart{position:fixed;left:0;right:0;bottom:0;background:rgba(17,17,17,.96);border-top:2px solid var(--gold);padding:12px 14px;backdrop-filter:blur(6px)}
    .cart-inner{max-width:980px;margin:0 auto;display:flex;gap:12px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
    .cart-left{min-width:240px;flex:1}
    .cart-title{color:var(--muted);font-size:12px;margin-bottom:6px}
    .cart-items{font-size:13px;line-height:1.35;max-height:90px;overflow:auto;padding-right:6px}
    .cart-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .total{color:var(--gold);font-size:16px;font-weight:900}
    .small{color:var(--muted);font-size:12px}
    .svc{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px}
    .svc input{transform:scale(1.1)}
    .action{padding:10px 12px;border-radius:12px;border:none;font-weight:900;cursor:pointer}
    .clear{background:#3a0b0b;color:#fff}
    .copy{background:#1a1a1a;color:var(--gold);border:1px solid var(--gold)}
    .send{background:var(--gold);color:#000}

    .mb{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;padding:14px}
    .modal{max-width:560px;width:100%;background:#0f0f0f;border:1px solid var(--gold);border-radius:16px;padding:14px}
    .modal h3{margin:0 0 10px;color:var(--gold);letter-spacing:1px}
    .modal pre{white-space:pre-wrap;word-break:break-word;background:#0b0b0b;border:1px solid var(--line);border-radius:12px;padding:10px;color:var(--text);font-size:13px}
    .m-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:10px}
    .close{background:#222;color:#fff;border:1px solid #444}
  </style>
</head>
<body>
  <header>
    <h1>AUTOGRAPH GOLD</h1>
    <div class="top">
      <button class="chip active" data-lang="ru">RU</button>
      <button class="chip" data-lang="kz">KZ</button>
    </div>
  </header>

  <div class="wrap">
    <div class="toolbar">
      <input id="q" class="search" placeholder="Поиск по меню..." />
      <div class="tabs">
        <button class="tab active" data-section="all">Всё</button>
        <button class="tab" data-section="food">Кухня</button>
        <button class="tab" data-section="bar">Бар</button>
      </div>
    </div>
    <div id="menu"></div>
  </div>

  <div class="cart">
    <div class="cart-inner">
      <div class="cart-left">
        <div class="cart-title" id="cartTitle">Выбрано:</div>
        <div class="cart-items" id="cartItems">Корзина пуста</div>
      </div>
      <div class="cart-right">
        <label class="svc"><input id="svc" type="checkbox" checked /> <span id="svcLabel">Сервис 10%</span></label>
        <div>
          <div class="total" id="total">Итого: 0 ₸</div>
          <div class="small" id="breakdown"></div>
        </div>
        <button class="action clear" id="clearBtn">Очистить</button>
        <button class="action copy" id="copyBtn">Показать заказ</button>
        <button class="action send" id="sendBtn">Отправить на WhatsApp</button>
      </div>
    </div>
  </div>

  <div class="mb" id="mb">
    <div class="modal">
      <h3 id="mTitle">Заказ</h3>
      <pre id="orderText"></pre>
      <div class="m-actions">
        <button class="action copy" id="mCopy">Скопировать</button>
        <button class="action close" id="mClose">Закрыть</button>
      </div>
    </div>
  </div>

        picked:'Таңдалғаны:', empty:'Себет бос', total:'Барлығы',
        svc:'Қызмет 10%', clear:'Тазалау', show:'Тапсырысты көрсету', send:'WhatsApp-қа жіберу',
        sum:'Сома', svcLine:'қызмет 10%', svcOff:'қызмет өшірулі',
        modal:'Тапсырыс', copied:'Көшірілді ✅'
      },
      food: [
        { name:'Сорпалар', items:[['Жасымық крем-сорпасы',2260],['Тауық қосылған рамен',4660],['Сиыр еті қосылған рамен',5990],['Теңіз өнімдерімен том ям',5990]]},
        { name:'Салаттар', items:[
          ['Карамельденген алмұрт және жаңғақ салаты',4560],['Манго салаты',4860],['«Бавариялық» салат',4960],['Қытырлақ баклажан',4990],
          ['Тауық қосылған Цезарь',5690],['Асшаян қосылған Цезарь',5690],['Албырт қосылған Цезарь',5690],['Жылы албырт салаты',5990],
          ['Сиыр етінен салат',5990],['Руккола және асшаян салаты',6290],['Ростбиф салаты',5990],['Моцарелла, авокадо және халлуми салаты',5600],['Албырт қосылған оливье',4400]
        ]},
        { name:'Компанияға арналған', items:[
          ['Тұтас пісірілген албырт',139990],['Картоппен қой еті',44990],['Бұқтырылған сиыр қабырғасы',44990],
          ['Пісірілген қозы жамбасы (15 адамға дейін)',48990],['Грильдегі ет ассорти (15 адамға дейін)',49990],['Грильдегі балық ассорти',59990]
        ]},
        { name:'Негізгі тағамдар', items:[['Саңырауқұлақ қосылған бауыр',4400],['Бұзау етінен бефстроганов',8660],['Сибас',10990],['Дорадо',10990],['Филе-миньон',11990],['Рибай стейк',12660],['Ти-Бон стейк',12990],['Аргентиналық тәсілмен албырт стейк',15660]]},
        { name:'Тіскебасарлар', items:[['Зәйтүн қосылған ассорти',3940],['Тауық попкорны',6790],['Қытайша судак',7960],['Баклажан соте',5990],['Кабачок соте',7990],['Ірімшік табақ',12960],['Ет ассорти',12960],['Қақталған балық ассорти',12960],['Қуырылған балық ассорти',19690],['Сыралық асшаян',6990]]},
        { name:'Шашлықтар', items:[['Шашлық сет Light',35000],['Шашлық сет Hard',60000],['Үйрек шашлығы',3800],['Шампиньон шашлығы',2500],['Сиыр еті шашлығы',5000],['Тауық филесі шашлығы',3500],['Қой еті шашлығы',4500],['Гриль көкөністер',2500],['Тауық люля-кебаб',3500],['Қой люля-кебаб',3800],['Қанатшалар',3500]]},
        { name:'Гарнирлер', items:[['Күріш',1290],['Картоп пюресі',1290],['Картоп фри',1690],['Брокколи және гүлді қырыққабат',1690],['Картоп тілімдері',1790],['Гриль көкөністер',2590],['Үйше картоп',2890]]},
        { name:'Тұздықтар', items:[['Демиглас',690],['Ірімшік тұздығы',690],['Кетчуп',690],['Барбекю',690],['Кілегейлі-саңырауқұлақ',690]]},

      bar: null
    }

  DATA.kz.bar = DATA.ru.bar;

  let lang='ru', section='all';
  let cart = {};

  const $ = (id)=>document.getElementById(id);
  const fmt = (n)=>String(n||0).replace(/\B(?=(\d{3})+(?!\d))/g,' ');
  const ui = ()=>DATA[lang].ui;

  function setLang(l){
    lang=l;
    document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active', b.dataset.lang===l));
    $('q').placeholder = ui().search;
    document.querySelector('[data-section="all"]').textContent = ui().all;
    document.querySelector('[data-section="food"]').textContent = ui().food;
    document.querySelector('[data-section="bar"]').textContent = ui().bar;
    $('cartTitle').textContent = ui().picked;
    $('svcLabel').textContent = ui().svc;
    $('clearBtn').textContent = ui().clear;
    $('copyBtn').textContent = ui().show;
    $('sendBtn').textContent = ui().send;
    $('mTitle').textContent = ui().modal;
    render();
    updateCart();
  }
  function setSection(s){
    section=s;
    document.querySelectorAll('[data-section]').forEach(t=>t.classList.toggle('active', t.dataset.section===s));
    render();
  }

  function add(name, price){
    if(!cart[name]) cart[name]={price, qty:0};
    cart[name].qty++;
    updateCart(); refreshQty();
  }
  function sub(name){
    if(!cart[name]) return;
    cart[name].qty--;
    if(cart[name].qty<=0) delete cart[name];
    updateCart(); refreshQty();
  }
  function clearCart(){ cart={}; updateCart(); refreshQty(); }

  function blocks(){
    const d = DATA[lang];
    const out=[];
    if(section==='all'||section==='food') out.push(...d.food);
    if(section==='all'||section==='bar') out.push(...d.bar);
    return out;
  }

  function render(){
    const q = ($('q').value||'').trim().toLowerCase();
    const root = $('menu');
    root.innerHTML='';

    for(const cat of blocks()){
      const items = cat.items.filter(([n]) => !q || n.toLowerCase().includes(q));
      if(!items.length) continue;

      const wrap = document.createElement('div');
      wrap.className='category';
      const h2=document.createElement('h2');
      h2.textContent=cat.name;
      wrap.appendChild(h2);

      for(const [name, price] of items){
        const row=document.createElement('div');
        row.className='item';

        const left=document.createElement('div');
        left.className='iname';
        left.textContent=name;

        const ps=document.createElement('span');
        ps.className='iprice';
        ps.textContent = fmt(price)+' ₸';
        left.appendChild(ps);

        const ctr=document.createElement('div');
        ctr.className='controls';

        const bSub=document.createElement('button');
        bSub.className='btn';
        bSub.textContent='−';
        bSub.dataset.action='sub';
        bSub.dataset.name=name;

        const qty=document.createElement('div');
        qty.className='qty';
        qty.dataset.qty=name;
        qty.textContent=String(cart[name]?.qty||0);

        const bAdd=document.createElement('button');
        bAdd.className='btn';
        bAdd.textContent='+';
        bAdd.dataset.action='add';
        bAdd.dataset.name=name;
        bAdd.dataset.price=String(price);

        ctr.appendChild(bSub); ctr.appendChild(qty); ctr.appendChild(bAdd);
        row.appendChild(left); row.appendChild(ctr);
        wrap.appendChild(row);
      }
      root.appendChild(wrap);
    }
  }

  function refreshQty(){
    document.querySelectorAll('[data-qty]').forEach(el=>{
      const name=el.dataset.qty;
      el.textContent=String(cart[name]?.qty||0);
    });
  }

  function updateCart(){
    const entries = Object.entries(cart);
    if(!entries.length){
      $('cartItems').textContent=ui().empty;
      $('total').textContent=ui().total+': 0 ₸';
      $('breakdown').textContent='';
      return;
    }
    let sum=0, html='';
    for(const [name, it] of entries){
      const line=it.price*it.qty;
      sum+=line;
      html += `${name} ×${it.qty} — ${fmt(line)} ₸<br>`;
    }
    const svcOn = $('svc').checked;
    const svc = svcOn ? Math.round(sum*0.10) : 0;
    const total = sum + svc;

    $('cartItems').innerHTML=html;
    $('total').textContent=ui().total+': '+fmt(total)+' ₸';
    $('breakdown').textContent = svcOn
      ? `${ui().sum}: ${fmt(sum)} ₸ + ${ui().svcLine}: ${fmt(svc)} ₸`
      : `${ui().sum}: ${fmt(sum)} ₸ (${ui().svcOff})`;
  }

  function orderText(){
    const entries=Object.entries(cart);
    if(!entries.length) return '';
    const svcOn=$('svc').checked;
    let sum=0;
    let t=`AUTOGRAPH GOLD — ${ui().modal.toLowerCase()}\n\n`;
    for(const [name, it] of entries){
      const line=it.price*it.qty;
      sum+=line;
      t += `• ${name} ×${it.qty} — ${fmt(line)} ₸\n`;
    }
    const svc=svcOn?Math.round(sum*0.10):0;
    const total=sum+svc;
    t += `\n${ui().sum}: ${fmt(sum)} ₸\n`;
    t += svcOn ? `${ui().svcLine}: ${fmt(svc)} ₸\n` : `${ui().svcOff}\n`;
    t += `${ui().total}: ${fmt(total)} ₸\n`;
    t += `\n${lang==='ru'?'Обслуживание: 10%':'Қызмет: 10%'}`;
    return t;
  }

  async function copyOrder(){
    const t=orderText(); if(!t) return;
    try{ await navigator.clipboard.writeText(t); alert(ui().copied); }
    catch{ /* если браузер запрещает */ $('orderText').textContent=t; showModal(); }
  }
  function showModal(){
    const t=orderText(); if(!t) return;
    $('orderText').textContent=t;
    $('mb').style.display='flex';
  }
  function hideModal(){ $('mb').style.display='none'; }
  function sendWA(){
    const t=orderText(); if(!t) return;
    window.open(`https://wa.me/${WA_PHONE}?text=${encodeURIComponent(t)}`, '_blank');
  }

  document.addEventListener('click',(e)=>{
    const t=e.target;
    if(t.matches('[data-lang]')) return setLang(t.dataset.lang);
    if(t.matches('[data-section]')) return setSection(t.dataset.section);

    if(t.dataset.action){
      const name=t.dataset.name;
      if(t.dataset.action==='add') return add(name, Number(t.dataset.price||0));
      return sub(name);
    }

    if(t.id==='clearBtn') return clearCart();
    if(t.id==='copyBtn') return showModal();
    if(t.id==='sendBtn') return sendWA();

    if(t.id==='mCopy') return copyOrder();
    if(t.id==='mClose' || t.id==='mb') return hideModal();
  });

  $('q').addEventListener('input', render);
  $('svc').addEventListener('change', updateCart);

  setLang('ru');
  setSection('all');
</script>
</body>
</html>
