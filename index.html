<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autograph Gold — QR Menu</title>
  <style>
    :root{
      --bg:#0b0b0b; --panel:#111; --gold:#bfa46a; --text:#f5f5f5; --muted:#bdbdbd; --line:#2a2a2a;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:18px 14px;text-align:center;border-bottom:2px solid var(--gold)}
    h1{margin:0;letter-spacing:3px;color:var(--gold);font-size:22px}
    .topbar{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:10px;flex-wrap:wrap}
    .chip{border:1px solid var(--gold);color:var(--gold);background:#000;padding:6px 10px;border-radius:10px;cursor:pointer}
    .chip.active{background:var(--gold);color:#0b0b0b;font-weight:800}

    .wrap{max-width:980px;margin:0 auto;padding:16px 14px 160px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin:10px 0 16px}
    .search{flex:1;min-width:220px;max-width:520px;background:#0f0f0f;border:1px solid var(--line);color:var(--text);
      padding:10px 12px;border-radius:12px;outline:none}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{border:1px solid var(--gold);background:transparent;color:var(--gold);padding:8px 10px;border-radius:12px;cursor:pointer}
    .tab.active{background:var(--gold);color:#0b0b0b;font-weight:800}

    .category{margin:22px 0}
    .category h2{margin:0 0 10px;color:var(--gold);font-size:18px;border-bottom:1px solid var(--gold);padding-bottom:6px}

    .item{display:flex;gap:10px;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line)}
    .iname{font-size:14px;line-height:1.25}
    .iprice{color:var(--muted);font-size:13px;margin-left:8px;white-space:nowrap}
    .controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:18px;cursor:pointer}
    .qty{min-width:18px;text-align:center;font-weight:800;color:var(--text)}

    .cart{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(180deg, rgba(17,17,17,.92), rgba(17,17,17,.98));
      border-top:2px solid var(--gold);padding:12px 14px;backdrop-filter: blur(6px)}
    .cart-inner{max-width:980px;margin:0 auto;display:flex;gap:12px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
    .cart-left{min-width:240px;flex:1}
    .cart-title{color:var(--muted);font-size:12px;margin-bottom:6px}
    .cart-items{font-size:13px;line-height:1.35;max-height:90px;overflow:auto;padding-right:6px}

    .cart-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .total{font-size:16px;font-weight:900;color:var(--gold)}
    .small{font-size:12px;color:var(--muted)}

    .action{border:none;border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:800}
    .clear{background:#3a0b0b;color:#fff}
    .send{background:var(--gold);color:#0b0b0b}
    .copy{background:#1a1a1a;color:var(--gold);border:1px solid var(--gold)}
    .svc-toggle{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px}
    .svc-toggle input{transform:scale(1.1)}

    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;padding:14px}
    .modal{max-width:560px;width:100%;background:#0f0f0f;border:1px solid var(--gold);border-radius:16px;padding:14px}
    .modal h3{margin:0 0 10px;color:var(--gold);letter-spacing:1px}
    .modal pre{white-space:pre-wrap;word-break:break-word;background:#0b0b0b;border:1px solid var(--line);
      border-radius:12px;padding:10px;color:var(--text);font-size:13px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;flex-wrap:wrap}
    .close{background:#222;color:#fff;border:1px solid #444}
  </style>
</head>

        </div>

        <button class="action copy" id="copyBtn">Скопировать</button>
        <button class="action send" id="sendBtn">Отправить на WhatsApp</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="mb">
    <div class="modal">

      <div class="modal-actions">

/* ========= ЛОГИКА ========= */
let lang = 'ru';
let section = 'all';
let cart = {}; // name -> {price, qty}

const $ = (id)=>document.getElementById(id);

function fmt(n){ return (n||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' '); }

function ui(){ return DATA[lang].ui; }

function setLang(l){
  lang = l;
  $('ruBtn').classList.toggle('active', l==='ru');
  $('kzBtn').classList.toggle('active', l==='kz');
  $('q').placeholder = ui().search;
  $('tabAll').textContent = ui().all;
  $('tabFood').textContent = ui().food;
  $('tabBar').textContent = ui().bar;
  $('cartTitle').textContent = ui().picked;
  $('svcLabel').textContent = ui().svc;
  $('clearBtn').textContent = ui().clear;
  $('copyBtn').textContent = ui().copy;
  $('sendBtn').textContent = ui().send;
  $('modalTitle').textContent = ui().modalTitle;
  render();
  updateCart();
}

function setSection(s){
  section = s;
  $('tabAll').classList.toggle('active', s==='all');
  $('tabFood').classList.toggle('active', s==='food');
  $('tabBar').classList.toggle('active', s==='bar');
  render();
}

function add(name, price){
  if(!cart[name]) cart[name] = {price, qty:0};
  cart[name].qty++;
  updateCart();
  refreshQtyBadges();
}

function sub(name){
  if(!cart[name]) return;
  cart[name].qty--;
  if(cart[name].qty<=0) delete cart[name];
  updateCart();
  refreshQtyBadges();
}

function clearCart(){
  cart = {};
  updateCart();
  refreshQtyBadges();
}

function buildOrderText(){
  const entries = Object.entries(cart);
  if(entries.length===0) return "";
  const svcOn = $('svc').checked;

  let sum = 0;
  let text = 'AUTOGRAPH GOLD — ' + (lang==='ru' ? 'заказ' : 'тапсырыс') + '\\n\\n';

  entries.forEach(([name, it])=>{
    const line = it.price * it.qty;
    sum += line;
    text += `• ${name} ×${it.qty} — ${fmt(line)} ₸\\n`;
  });

  const svc = svcOn ? Math.round(sum * 0.10) : 0;
  const total = sum + svc;

  text += `\\n${ui().sum}: ${fmt(sum)} ₸\\n`;
  text += svcOn ? `${ui().svcLine}: ${fmt(svc)} ₸\\n` : `${ui().svcOff}\\n`;
  text += `${ui().total.toUpperCase()}: ${fmt(total)} ₸\\n`;
  text += `\\n${lang==='ru' ? 'Обслуживание: 10%' : 'Қызмет: 10%'}`;

  return text;
}

function openModal(){
  const t = buildOrderText();
  if(!t) return;
  $('orderText').textContent = t;
  $('mb').style.display = 'flex';
}

function hideModal(){ $('mb').style.display = 'none'; }

async function copyText(t){
  try{ await navigator.clipboard.writeText(t); alert(ui().copied); }
  catch(e){ alert(lang==='ru' ? 'Не удалось. Скопируй вручную из окна.' : 'Көшірілмеді. Қолмен көшіріңіз.'); }
}

function sendWhatsApp(){
  const t = buildOrderText();
  if(!t) return;
  // WhatsApp deep link
  const url = `https://wa.me/${PHONE_WA}?text=${encodeURIComponent(t)}`;
  window.open(url, '_blank');
}

function render(){
  const q = ($('q').value || '').trim().toLowerCase();
  const root = $('menu');
  root.innerHTML = '';

  const d = DATA[lang];
  const blocks = [];
  if(section==='all' || section==='food') blocks.push(...d.food.map(c=>({type:'food',...c})));
  if(section==='all' || section==='bar')  blocks.push(...d.bar.map(c=>({type:'bar',...c})));

  blocks.forEach(cat=>{
    const items = cat.items.filter(([n]) => !q || n.toLowerCase().includes(q));
    if(items.length===0) return;

    const wrap = document.createElement('div');
    wrap.className = 'category';
    wrap.innerHTML = `<h2>${cat.name}</h2>`;

    items.forEach(([name, price])=>{
      const qty = cart[name]?.qty || 0;
      const row = document.createElement('div');
      row.className = 'item';

      row.innerHTML = `
        <div class="iname">
          ${name}<span class="iprice">${fmt(price)} ₸</span>
        </div>
        <div class="controls">
          <button class="btn" data-action="sub" data-name="${escapeAttr(name)}">−</button>
          <div class="qty" data-qty="${escapeAttr(name)}">${qty}</div>
          <button class="btn" data-action="add" data-name="${escapeAttr(name)}" data-price="${price}">+</button>
        </div>
      `;
      wrap.appendChild(row);
    });

    root.appendChild(wrap);
  });
}

function escapeAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function refreshQtyBadges(){
  document.querySelectorAll('[data-qty]').forEach(el=>{
    const name = el.getAttribute('data-qty');
    el.textContent = cart[name]?.qty || 0;
  });
}

function updateCart(){
  const entries = Object.entries(cart);
  const listEl = $('cartItems');

  if(entries.length===0){
    listEl.textContent = ui().empty;
    $('total').textContent = `${ui().total}: 0 ₸`;
    $('breakdown').textContent = '';
    return;
  }

  let sum = 0;
  let html = '';
  entries.forEach(([name, it])=>{
    const line = it.price * it.qty;
    sum += line;
    html += `${name} ×${it.qty} — ${fmt(line)} ₸<br>`;
  });

  const svcOn = $('svc').checked;
  const svc = svcOn ? Math.round(sum*0.10) : 0;
  const total = sum + svc;

  listEl.innerHTML = html;
  $('total').textContent = `${ui().total}: ${fmt(total)} ₸`;
  $('breakdown').textContent = svcOn
    ? `${ui().sum}: ${fmt(sum)} ₸ + ${ui().svcLine}: ${fmt(svc)} ₸`
    : `${ui().sum}: ${fmt(sum)} ₸ (${ui().svcOff})`;
}

/* ========= СОБЫТИЯ (важно!) ========= */
document.addEventListener('click', (e)=>{
  const t = e.target;

  // language
  if(t.matches('[data-lang]')){
    setLang(t.getAttribute('data-lang'));
    return;
  }

  // tabs
  if(t.matches('[data-section]')){
    setSection(t.getAttribute('data-section'));
    return;
  }

  // menu buttons +/-
  if(t.matches('[data-action]')){
    const action = t.getAttribute('data-action');
    const name = t.getAttribute('data-name');
    const price = Number(t.getAttribute('data-price') || 0);

    if(action==='add') add(name, price);
    if(action==='sub') sub(name);
    return;
  }

  if(t.id==='clearBtn'){ clearCart(); return; }
  if(t.id==='copyBtn'){ const txt = buildOrderText(); if(txt) copyText(txt); return; }
  if(t.id==='sendBtn'){ sendWhatsApp(); return; }

  if(t.id==='modalCopy'){ const txt = $('orderText').textContent; if(txt) copyText(txt); return; }
  if(t.id==='modalClose'){ hideModal(); return; }
  if(t.id==='mb'){ hideModal(); return; }
});

$('q').addEventListener('input', render);
$('svc').addEventListener('change', updateCart);

// старт
setLang('ru');
updateCart();
</script>
</body>
</html>
